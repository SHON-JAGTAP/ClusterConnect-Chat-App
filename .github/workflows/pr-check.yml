name: PR Quality Gate

on:
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened]

# ─────────────────────────────────────────────────────────────────────────────
# This workflow runs fast checks on every PR so reviewers get quick feedback.
# It does NOT build or push Docker images.
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  # ── 1. Backend checks ───────────────────────────────────────────────────────
  backend-check:
    name: 🔧 Backend Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: clusterconnect-backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install deps
        run: npm ci

      - name: Syntax check (all JS files)
        run: find . -name "*.js" ! -path "*/node_modules/*" | xargs node --check

  # ── 2. Frontend checks ──────────────────────────────────────────────────────
  frontend-check:
    name: 🎨 Frontend Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Frontend/clusterconnect-client

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install deps
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build check
        run: npm run build
        env:
          VITE_API_URL: http://localhost:5000

  # ── 3. Docker build validation (no push) ───────────────────────────────────
  docker-validate:
    name: 🐳 Docker Build Validation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Validate backend Dockerfile
        uses: docker/build-push-action@v5
        with:
          context: ./clusterconnect-backend
          file: ./clusterconnect-backend/Dockerfile
          push: false                         # NO push on PRs
          tags: clusterconnect-backend:pr-test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Validate frontend Dockerfile
        uses: docker/build-push-action@v5
        with:
          context: ./Frontend/clusterconnect-client
          file: ./Frontend/clusterconnect-client/Dockerfile
          push: false
          tags: clusterconnect-frontend:pr-test
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_API_URL=http://localhost:5000

  # ── 4. Summary status check (branch protection target) ─────────────────────
  pr-status:
    name: ✅ PR Ready
    runs-on: ubuntu-latest
    needs: [backend-check, frontend-check, docker-validate]
    if: always()

    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.backend-check.result }}" != "success" || \
                "${{ needs.frontend-check.result }}" != "success" || \
                "${{ needs.docker-validate.result }}" != "success" ]]; then
            echo "One or more checks failed!"
            exit 1
          fi
          echo "All checks passed! PR is ready for review."
