name: ClusterConnect CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: docker.io                     # Change to ghcr.io if you prefer GitHub Container Registry
  BACKEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/clusterconnect-backend
  FRONTEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/clusterconnect-frontend

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 ─ Backend CI (lint + unit tests)
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  backend-ci:
    name: 🔧 Backend – Lint & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: clusterconnect-backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      # Add real tests later; this just verifies the server module parses
      - name: Run tests (smoke)
        run: node --check server.js
        env:
          NODE_ENV: test

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 2 ─ Frontend CI (lint + build)
  # ───────────────────────────────────────────────────────────────────────────
  frontend-ci:
    name: 🎨 Frontend – Lint & Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Frontend/clusterconnect-client

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build (production)
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: Frontend/clusterconnect-client/dist/
          retention-days: 7

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 3 ─ Build & Push Docker images (only on pushes to main / develop)
  # ───────────────────────────────────────────────────────────────────────────
  docker-build-push:
    name: 🐳 Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]
    # Skip for PRs AND skip if Docker Hub secrets are not configured yet
    if: |
      github.event_name == 'push' &&
      secrets.DOCKERHUB_USERNAME != ''

    outputs:
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Enable QEMU for multi-platform builds (optional – remove if not needed)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Generate image tags: branch name + short SHA  (e.g. main-abc1234)
      - name: Extract Docker metadata (backend)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Extract Docker metadata (frontend)
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      # ── Backend image ──────────────────────────────────────────────────────
      - name: Build & Push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./clusterconnect-backend
          file: ./clusterconnect-backend/Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      # ── Frontend image ─────────────────────────────────────────────────────
      - name: Build & Push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./Frontend/clusterconnect-client
          file: ./Frontend/clusterconnect-client/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}

      - name: Export short SHA for downstream jobs
        id: meta
        run: echo "version=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 4 ─ Deploy to Kubernetes (DISABLED until cluster is ready)
